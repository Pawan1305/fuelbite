<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – FuelBite</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">🔥 FuelBite</div>
      <p>Admin Panel</p>
    </div>
    <h2>Sign In</h2>
    <div class="form-group">
      <label for="adminUser">Username</label>
      <input type="text" id="adminUser" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="adminPass">Password</label>
      <input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    <div class="error-msg" id="loginError">Invalid credentials. Please try again.</div>
  </div>
</div>

<script>
/**
 * Login flow:
 * 1. Client sends credentials to Netlify Function /.netlify/functions/admin-auth
 * 2. The function compares against ADMIN_USER and ADMIN_PASS environment variables
 * 3. On success, a session token is stored in sessionStorage (no password ever in front-end)
 */
async function doLogin() {
  const user = document.getElementById('adminUser').value.trim();
  const pass = document.getElementById('adminPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!user || !pass) {
    errEl.textContent = 'Please enter username and password.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('/.netlify/functions/admin-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });
    const data = await res.json();

    if (res.ok && data.token) {
      sessionStorage.setItem('fb_admin_token', data.token);
      window.location.href = 'dashboard.html';
    } else {
      errEl.textContent = data.error || 'Invalid credentials.';
      errEl.style.display = 'block';
    }
  } catch (err) {
    // Fallback for local development without netlify dev
    errEl.textContent = 'Could not connect to auth server. Run via Netlify Dev.';
    errEl.style.display = 'block';
  }
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// If already logged in, redirect
if (sessionStorage.getItem('fb_admin_token')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
